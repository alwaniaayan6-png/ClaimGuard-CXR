# v5.4-final: full loss, 5 seeds, MC-dropout uncertainty on.
defaults:
  - base

loss:
  cls: 1.0
  ground: 0.5
  consist: 0.3
  contrast: 0.3
  uncert: 0.1

train:
  epochs: 4
  adversarial_ho_filter: true
  wandb_run_name: v5_4_final

seeds: [17, 29, 41, 53, 67]

data_mix:
  real_fraction: 0.5
  synthetic_fraction: 0.3
  ms_cxr_fraction: 0.2
